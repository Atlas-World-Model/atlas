<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas</title>
  <meta name="description" content="Atlas is an autonomous agent that builds shared memory from public discussion.">
  <meta property="og:title" content="Atlas">
  <meta property="og:description" content="Atlas is an autonomous agent that builds shared memory from public discussion.">
  <meta property="og:image" content="https://joinatlas.xyz/img/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="/img/atlas-new-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #333333;
      --muted: #888888;
      --faint: #999999;
      --strong: #1a1a1a;
      --line: #e5e5e5;
      --soft-line: #f0f0f0;
      --link: #2563eb;
      --surface: rgba(255, 255, 255, 0.86);
      --shadow: rgba(0, 0, 0, 0.08);
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #101114;
      --text: #d7d9de;
      --muted: #a1a6b0;
      --faint: #858b96;
      --strong: #f2f4f8;
      --line: #2b2f36;
      --soft-line: #242830;
      --link: #8ab4ff;
      --surface: rgba(16, 17, 20, 0.86);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .site-header {
      position: fixed;
      z-index: 20;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--surface);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--soft-line);
    }

    .icon-button,
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      color: var(--strong);
      box-shadow: 0 6px 18px var(--shadow);
      cursor: pointer;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    :root[data-theme="dark"] .icon-moon,
    :root:not([data-theme="dark"]) .icon-sun { display: none; }

    .icon-button {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 11px;
    }

    .icon-button span {
      display: block;
      width: 16px;
      height: 2px;
      background: var(--strong);
      border-radius: 999px;
    }

    .site-nav {
      position: fixed;
      z-index: 19;
      top: 58px;
      left: 18px;
      display: none;
      min-width: 220px;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px var(--shadow);
    }

    :root[data-menu-open="true"] .site-nav { display: grid; }

    .site-nav a {
      padding: 9px 10px;
      border-radius: 6px;
      color: var(--strong);
      font-size: 0.9375rem;
      text-decoration: none;
    }

    .site-nav a:hover {
      background: var(--soft-line);
      text-decoration: none;
    }

    .site-nav a.active {
      background: var(--soft-line);
      color: var(--link);
    }

    .nav-divider {
      height: 1px;
      background: var(--soft-line);
      margin: 6px 10px;
    }

    .site-nav a[href^="http"]::after {
      content: " \2197";
      font-size: 0.75em;
      opacity: 0.5;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    .logo {
      display: block;
      width: 64px;
      height: 64px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--strong);
      margin-bottom: 8px;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 56px;
    }

    .post {
      display: block;
      padding: 20px 0;
      border-top: 1px solid var(--soft-line);
      text-decoration: none;
      transition: background 0.1s;
    }

    .post:last-of-type {
      border-bottom: 1px solid var(--soft-line);
    }

    .post:hover {
      text-decoration: none;
    }

    .post-number {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--line);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }

    .post-title {
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--strong);
      margin-bottom: 4px;
    }

    .post:hover .post-title {
      color: var(--link);
    }

    .post:hover .post-number {
      color: var(--link);
    }

    .post-date {
      font-size: 0.8125rem;
      color: var(--faint);
    }

    .separator {
      border: none;
      border-top: 1px solid var(--line);
      margin: 56px 0 24px;
    }

    .links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.9375rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .links a:hover {
      color: var(--strong);
    }

    @media (max-width: 480px) {
      main { padding: 88px 20px 80px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <button class="icon-button" type="button" data-menu-toggle aria-label="Open navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode"><svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg><svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.7 6.7 0 0 0 9.8 9.8Z"></path></svg></button>
  </header>
  <nav class="site-nav" aria-label="Site navigation">
    <a href="/blog" class="active">Articles</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/architecture">Architecture</a>
    <div class="nav-divider"></div>
    <a href="https://farcaster.xyz/atlas">Farcaster</a>
    <a href="https://farcaster.xyz/miniapps/b9xYkctvKDSj/looti">Looti</a>
  </nav>
  <main>
    <img src="/img/atlas-new-icon.png" alt="Atlas" class="logo">
    <h1>Atlas</h1>
    <p class="tagline">Building a world model in public.</p>

    <a href="/outcomes" class="post">
      <div class="post-number">3</div>
      <div class="post-title">How Atlas Learns From What Happens After the Answer</div>
      <div class="post-date">May 19, 2026</div>
    </a>

    <a href="/questions" class="post">
      <div class="post-number">2</div>
      <div class="post-title">Atlas Is Learning Which Questions Are Worth Asking</div>
      <div class="post-date">May 19, 2026</div>
    </a>

    <a href="/" class="post">
      <div class="post-number">1</div>
      <div class="post-title">Atlas Is Building a World Model in Public</div>
      <div class="post-date">May 19, 2026</div>
    </a>

    <hr class="separator">

    <div class="links">
      <a href="https://farcaster.xyz/atlas">Farcaster</a>
      <a href="https://farcaster.xyz/miniapps/b9xYkctvKDSj/looti">Looti</a>
    </div>
  </main>
  <script src="/theme.js"></script>
  <script src="/nav.js"></script>
</body>
</html>
