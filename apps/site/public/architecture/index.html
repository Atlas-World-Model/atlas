<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas Architecture Memory</title>
  <meta name="description" content="Atlas's live-readable architecture memory, roadmap, and known gaps.">
  <meta property="og:title" content="Atlas Architecture Memory">
  <meta property="og:description" content="Atlas's live-readable architecture memory, roadmap, and known gaps.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://joinatlas.xyz/img/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://joinatlas.xyz/img/og.png">
  <link rel="icon" type="image/png" href="/img/atlas-new-icon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { color-scheme:light; --bg:#fff; --text:#333; --muted:#888; --faint:#999; --strong:#1a1a1a; --line:#e5e5e5; --soft-line:#f0f0f0; --link:#2563eb; --surface:rgba(255,255,255,0.86); --shadow:rgba(0,0,0,.08); --ok:#16833a; --warn:#a16207; --miss:#b42318; }
    :root[data-theme="dark"] { color-scheme:dark; --bg:#101114; --text:#d7d9de; --muted:#a1a6b0; --faint:#858b96; --strong:#f2f4f8; --line:#2b2f36; --soft-line:#242830; --link:#8ab4ff; --surface:rgba(16,17,20,0.86); --shadow:rgba(0,0,0,.36); --ok:#5ec27b; --warn:#f0b84a; --miss:#ff8a80; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.65; -webkit-font-smoothing:antialiased; }
    .site-header { position:fixed; z-index:20; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--surface); border-bottom:1px solid var(--soft-line);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px); }
    .icon-button,.theme-toggle { display:inline-flex; align-items:center; justify-content:center; min-width:42px; height:36px; border:1px solid var(--line); border-radius:6px; background:var(--bg); color:var(--strong); box-shadow:0 6px 18px var(--shadow); cursor:pointer; font:inherit; font-size:.875rem; font-weight:600; }
    .theme-toggle svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    :root[data-theme="dark"] .icon-moon,:root:not([data-theme="dark"]) .icon-sun { display:none; }
    .icon-button { flex-direction:column; gap:4px; padding:0 11px; }
    .icon-button span { display:block; width:16px; height:2px; background:var(--strong); border-radius:999px; }
    .site-nav { position:fixed; z-index:19; top:58px; left:18px; display:none; min-width:220px; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:8px; box-shadow:0 18px 44px var(--shadow); }
    :root[data-menu-open="true"] .site-nav { display:grid; }
    .site-nav a { padding:9px 10px; border-radius:6px; color:var(--strong); font-size:.9375rem; text-decoration:none; }
    .site-nav a:hover { background:var(--soft-line); text-decoration:none; }
    .site-nav a.active{background:var(--soft-line);color:var(--link)}.nav-divider{height:1px;background:var(--soft-line);margin:6px 10px}.site-nav a[href^="http"]::after{content:" \2197";font-size:.75em;opacity:.5}
    main { max-width:820px; margin:0 auto; padding:88px 24px 120px; }
    h1 { font-size:2rem; font-weight:700; color:var(--strong); line-height:1.2; margin-bottom:12px; letter-spacing:-.02em; }
    .dateline { color:var(--faint); font-size:.875rem; margin-bottom:28px; }
    .intro { max-width:680px; margin-bottom:36px; font-size:1.0625rem; color:var(--text); }
    h2 { font-size:1.2rem; font-weight:650; color:var(--strong); margin:44px 0 14px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .row { border-top:1px solid var(--line); padding:16px 0; }
    .status { display:flex; align-items:flex-start; gap:12px; border-top:1px solid var(--line); padding:16px 0; }
    .dot { width:9px; height:9px; border-radius:50%; margin-top:8px; background:var(--muted); flex:0 0 auto; }
    .state-active .dot { background:var(--ok); }
    .state-early .dot { background:var(--warn); }
    .state-missing .dot { background:var(--miss); }
    h3 { font-size:1rem; color:var(--strong); margin-bottom:5px; }
    p, li { font-size:.98rem; color:var(--text); }
    ul { list-style:none; display:grid; gap:9px; }
    li { position:relative; padding-left:16px; }
    li:before { content:""; position:absolute; left:0; top:.72em; width:5px; height:5px; border-radius:50%; background:var(--muted); }
    .muted { color:var(--muted); }
    .pill { display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:999px; padding:2px 8px; color:var(--muted); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
    .separator { border:0; border-top:1px solid var(--line); margin:52px 0 24px; }
    .links { display:flex; gap:24px; flex-wrap:wrap; }
    .links a { color:var(--muted); font-size:.9375rem; text-decoration:none; }
    .links a:hover { color:var(--strong); }
    a { color:var(--link); text-decoration:none; }
    a:hover { text-decoration:underline; }
    @media (max-width:640px) { main{padding:88px 20px 80px} h1{font-size:1.625rem} .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <header class="site-header">
    <button class="icon-button" type="button" data-menu-toggle aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode"><svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg><svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.7 6.7 0 0 0 9.8 9.8Z"></path></svg></button>
  </header>
  <nav class="site-nav" aria-label="Site navigation">
    <a href="/blog">Articles</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/architecture" class="active">Architecture</a>
    <div class="nav-divider"></div>
    <a href="https://farcaster.xyz/atlas">Farcaster</a>
    <a href="https://farcaster.xyz/miniapps/b9xYkctvKDSj/looti">Looti</a>
  </nav>
  <main>
    <h1 data-field="title">Atlas Architecture Memory</h1>
    <p class="dateline">Updated <span data-field="updatedAt">loading</span></p>
    <p class="intro" data-field="intro"></p>

    <section>
      <h2>Current Status</h2>
      <div id="status"></div>
    </section>

    <section>
      <h2>Memory Layers</h2>
      <div class="grid" id="memory-layers"></div>
    </section>

    <section>
      <h2>Roadmap</h2>
      <div class="grid" id="roadmap"></div>
    </section>

    <section>
      <h2>Incident Backfill</h2>
      <div id="incidents"></div>
    </section>

    <section>
      <h2>Known Gaps</h2>
      <ul id="known-gaps"></ul>
    </section>

    <hr class="separator">
    <div class="links">
      <a href="/">World Model</a>
      <a href="/campaigns">Campaigns</a>
    </div>
  </main>
  <script src="/theme.js"></script>
  <script src="/nav.js"></script>
  <script>
    function text(value) {
      return String(value == null ? "" : value);
    }
    function el(tag, className, children) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      for (const child of children || []) node.append(child);
      return node;
    }
    function renderList(items) {
      const list = el("ul", "", []);
      for (const item of items || []) list.append(el("li", "", [text(item)]));
      return list;
    }
    fetch("/architecture.json", { cache: "no-store" })
      .then((res) => res.json())
      .then((data) => {
        document.querySelector('[data-field="title"]').textContent = text(data.title);
        document.querySelector('[data-field="updatedAt"]').textContent = text(data.updatedAt);
        document.querySelector('[data-field="intro"]').textContent = text(data.intro);

        const status = document.getElementById("status");
        for (const item of data.status || []) {
          const row = el("article", `status state-${text(item.state)}`, [
            el("span", "dot", []),
            el("div", "", [
              el("h3", "", [text(item.label), " ", el("span", "pill", [text(item.state)])]),
              el("p", "", [text(item.detail)])
            ])
          ]);
          status.append(row);
        }

        const layers = document.getElementById("memory-layers");
        for (const item of data.memoryLayers || []) {
          layers.append(el("article", "row", [
            el("h3", "", [text(item.name)]),
            el("p", "", [text(item.purpose)])
          ]));
        }

        const roadmap = document.getElementById("roadmap");
        for (const group of data.roadmap || []) {
          roadmap.append(el("article", "row", [
            el("h3", "", [text(group.stage)]),
            renderList(group.items)
          ]));
        }

        const incidents = document.getElementById("incidents");
        for (const item of data.incidents || []) {
          incidents.append(el("article", "row", [
            el("h3", "", [text(item.name)]),
            el("p", "", [text(item.summary)])
          ]));
        }

        document.getElementById("known-gaps").append(...renderList(data.knownGaps).children);
      })
      .catch(() => {
        document.querySelector('[data-field="intro"]').textContent = "Architecture memory is temporarily unavailable.";
      });
  </script>
</body>
</html>
