name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'services/runtime/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude node_modules --exclude .env --exclude .git
          path: ./
          remote_path: /opt/atlas/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Restart runtime
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            systemctl restart atlas-runtime
            sleep 2
            systemctl is-active atlas-runtime
